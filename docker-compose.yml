services:
  # ── PostgreSQL ──
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-transitops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-transitops_secret}
      POSTGRES_DB: ${POSTGRES_DB:-transitops}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-transitops}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (Express + Prisma) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-transitops}:${POSTGRES_PASSWORD:-transitops_secret}@db:5432/${POSTGRES_DB:-transitops}
      CORS_ORIGIN: http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy

  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5001
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
